[structure]
vacuum = 10.0

[structure.fcc]
elements = ["Pt"]
size = [3, 3, 4]

[structure.hcp]
elements = []
size = [3, 3, 4]

[structure.bcc]
elements = []
size = [3, 3, 4]

[generation]
layers_to_swap = 1
num_swaps = 2
only_last_generation = true
swap_elements = [
    "Cu",
    "Ag",
    "Au",
    "Ni",
    "Pt",
    "Pd",
    "Co",
    "Rh",
    "Ir",
    "Fe",
    "Ru",
    "Os",
    "Mn",
    "Re",
    "Cr",
    "Mo",
    "W",
    "V",
    "Ta",
    "Ti",
    "Hf",
    "Sc",
]

[database]
path = "data/example.db"
constrain_bottom_layers = 2         # Set to 0 to disable FixAtoms generation.
constraint_z_tolerance = 0.5
constraint_lowest_z_tolerance = 0.5

[adsorbate]
species = "N"
coords = [[0.0, 0.0, 0.0]]            # For OH: [0.0, 0.0, 0.0], [0.937, 0.0, 0.287]
sites = ["ontop", "bridge", "hollow"] # Supported: "ontop", "bridge", "hollow"
tag = 0
surface_layers_for_matching = 2       # Use 1 to collapse FCC/HCP hollow registries.
reuse_site_templates_for_two_swap_motifs = true
template_site_match_tolerance = 0.5   # Cartesian distance tolerance when mapping raw sites onto a cached template.

[adsorbate.matcher]
ltol = 0.05
stol = 0.1
angle_tol = 5.0
